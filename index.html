<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word Counter</title><meta name="description" content="Free online word and character counter."><link rel="stylesheet" href="style.css"></head><body><main class="wrap"><h1>Word Counter & Character Counter</h1><textarea id="text" placeholder="Type or paste text..."></textarea><div class="grid"><div>Words: <span id="w">0</span></div><div>Characters: <span id="c">0</span></div><div>Characters (no spaces): <span id="n">0</span></div><div>Sentences: <span id="s">0</span></div><div>Paragraphs: <span id="p">0</span></div><div>Reading: <span id="r">0 min</span></div></div><button id="copy">Copy</button><button id="clear">Clear</button></main><script src="script.js"></script></body></html>
